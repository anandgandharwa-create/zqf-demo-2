<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meditation</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#020617,#071826);
color:#fff;
text-align:center;
}

/* Container */
.container{
padding:30px 20px;
max-width:400px;
margin:auto;
}

/* Title */
h2{
margin-top:30px;
font-size:26px;
}

/* Circle breathing */
.circle{
width:160px;
height:160px;
margin:40px auto;
border-radius:50%;
background:radial-gradient(circle,#00ffcc,#007a66);
animation:breath 6s infinite;
}

/* Breathing animation */
@keyframes breath{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* Text */
.guide{
font-size:18px;
margin-top:10px;
}

/* Button */
.btn{
margin-top:40px;
padding:14px 20px;
background:#ffd700;
color:#000;
border:none;
border-radius:16px;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>🧘‍♂️ बस सांस पर ध्यान दें</h2>

<div class="circle"></div>

<div class="guide" id="guideText">
धीरे-धीरे सांस लें...
</div>

<button class="btn" onclick="goHome()">Home</button>

</div>

<script>
let text = document.getElementById("guideText");

setInterval(()=>{
if(text.innerText.includes("लें")){
text.innerText="धीरे-धीरे सांस छोड़ें...";
}else{
text.innerText="धीरे-धीरे सांस लें...";
}
},3000);

function goHome(){
window.location.href="../index.html";
}
</script>

</body>
</html>
