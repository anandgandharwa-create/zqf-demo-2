<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧠 गीता आत्म-परीक्षण</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle, #1a0000, #000000);
    color: white;
    text-align: center;
}

/* Container */
.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

/* Title */
h1 {
    color: gold;
    margin-bottom: 10px;
}

.subtitle {
    color: #ffcc00;
    font-size: 14px;
    margin-bottom: 20px;
}

/* Card */
.card {
    background: rgba(255, 0, 0, 0.08);
    border: 1px solid rgba(255, 215, 0, 0.3);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
}

/* Question */
#question {
    font-size: 18px;
    margin-bottom: 15px;
}

/* Options */
.option {
    background: linear-gradient(45deg, #ffcc00, #ff9900);
    color: black;
    margin: 10px 0;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
}

.option.selected {
    background: red;
    color: white;
}

/* Button */
.next-btn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 12px;
    font-size: 16px;
    background: linear-gradient(45deg, #00c853, #00e676);
   color: black;  
    box-shadow: 0 0 10px rgba(0, 255, 100, 0.6);
    border: none;
    cursor: pointer;
}

/* Result */
.result {
    margin-top: 15px;
    color: gold;
    font-size: 16px;
    animation: fadeIn 1s ease-in-out;
}
.home-btn {
    margin-top: 25px;
    padding: 10px 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ffffff, #dddddd);
    color: black;
    cursor: pointer;
    font-weight: bold;
}
 .home-container {
    margin-top: 25px;
    text-align: center;
}

/* Restart */
#restartBtn {
    margin-top: 20px;
    background: gold;
    color: black;
}
   .success-text {
    color: #00e676;
    font-weight: bold;
    display: block;
    margin-top: 12px;
    text-shadow: 0 0 8px rgba(0, 255, 100, 0.8);
}
  .home-text {
    color: #ffffff;
    display: block;
    margin-top: 8px;
    font-size: 15px;
}
    .fade-in {
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>🧠 गीता आत्म-परीक्षण</h1>
    <div class="subtitle">⏳ सिर्फ 30 सेकंड – खुद को जानिए</div>

    <div class="card">
        <div id="question"></div>
        <div id="options"></div>

        <div id="result" class="result"></div>

        <button id="nextBtn" class="next-btn" onclick="nextQuestion()" style="display:none;">
           🚀 अगले चरण पर जाएँ
        </button>

        <button id="restartBtn" class="next-btn" onclick="restartGame()" style="display:none;">
            🔁 फिर से शुरू करें
        </button>

      <div class="home-container">
    <button onclick="goHome()">🏠 Back to Home</button>
</div>
    </div>

</div>

<script>

let questions = [
{
    question: "गीता के अनुसार आपकी सबसे बड़ी बाधा क्या है?",
    options: ["डर", "मोह", "आलस्य"]
},
{
    question: "आपके जीवन में अभी सबसे जरूरी क्या है?",
    options: ["शांति", "साहस", "स्पष्टता"]
},
{
    question: "आपका मन आपको कहाँ रोक रहा है?",
    options: ["भूतकाल", "भविष्य की चिंता", "लोग क्या कहेंगे"]
}
];

let answers = [];
let current = 0;
let selected = null;

function loadQuestion(){
    let q = questions[current];
    document.getElementById("question").innerText = q.question;

    let html = "";
    q.options.forEach(opt => {
        html += `<div class="option" onclick="selectOption('${opt}', this)">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = html;
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("result").innerHTML = "";
}

function selectOption(opt, el){
    selected = opt;
    document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
    el.classList.add("selected");
    document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion(){

    if(!selected){
        alert("⚠️ एक विकल्प चुनिए");
        return;
    }

    answers.push(selected);
    selected = null;
    current++;

    if(current >= questions.length){
        showResult();
        return;
    }

    loadQuestion();
}

function showResult(){

let msg = "";

if(answers.includes("डर")){
    msg = "डर से मत भागो… वही तुम्हारी सबसे बड़ी शक्ति बनने वाला है।<br><br>जब तुम डर के पार कदम रखते हो, तभी असली विकास शुरू होता है।<br><br>👉 आज एक छोटा कदम उठाओ - वही तुम्हें नई ऊँचाई पर ले जाएगा।";
} 
else if(answers.includes("मोह")){
    msg = "मोह ही दुख का मूल कारण है… और यही तुम्हें आगे बढ़ने से रोक रहा है।<br><br>जब तुम छोड़ना सीखते हो, तभी सच्ची शांति और स्वतंत्रता मिलती है।<br><br>👉 आज एक ऐसी चीज़ छोड़ो जो तुम्हें बाँध रही है।";
} 
else{
    msg = "स्पष्टता ही सफलता का मार्ग है… और तुम्हारा मन अब सही दिशा दिखा रहा है।<br><br>जब ध्यान कर्म पर होता है, तो परिणाम अपने आप बेहतर बनते हैं।<br><br>👉 आज बिना भ्रम के, एक सही निर्णय लो।";
}

document.getElementById("question").innerText = "✨ आपका मार्ग";
document.getElementById("options").innerHTML = "";

/* 🌟 FULL RESULT WITH EFFECT */
document.getElementById("result").innerHTML = `
<div class="fade-in">
${msg}

<span class="success-text">✨ आप बदल रहे हैं… और यही सबसे बड़ी शुरुआत है</span>

<span class="home-text">👉 और जानने के लिए Home पर जाएँ</span>
</div>
`;

document.getElementById("restartBtn").style.display = "block";
document.getElementById("nextBtn").style.display = "none";
}
function restartGame(){
    current = 0;
    answers = [];
    selected = null;
    document.getElementById("restartBtn").style.display = "none";
    loadQuestion();
}

loadQuestion();
function goHome(){
    window.location.href = "../index.html";
}
</script>

</body>
</html>
