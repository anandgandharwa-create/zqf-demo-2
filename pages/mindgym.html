<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Gym</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#071826;
color:#fff;
text-align:center;
}

header{
background:linear-gradient(90deg,#5b2c83,#402060);
padding:16px;
font-size:20px;
font-weight:bold;
position:relative;
}

.back{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.container{
padding:20px;
max-width:420px;
margin:auto;
}

/* Stats */
.stats{
display:flex;
justify-content:space-between;
background:#0b1f2d;
padding:14px;
border-radius:14px;
margin-bottom:20px;
}

/* Card */
.card{
background:#0f2f1f;
border-radius:18px;
padding:18px;
margin-bottom:14px;
cursor:pointer;
}

/* Breathing */
.circle{
width:120px;
height:120px;
margin:25px auto;
border-radius:50%;

/* 🌿 Gradient look */
background:radial-gradient(circle,#00ffd5,#007a6d);

/* ✨ soft glow */
box-shadow:
0 0 10px rgba(0,255,200,0.3),
0 0 25px rgba(0,255,200,0.5),
0 0 50px rgba(0,255,200,0.25);

/* 🔥 ultra smooth breathing */
animation: breathe 8s infinite ease-in-out;
}

/* 🌊 smooth breathing animation */
@keyframes breathe{
0%{
transform:scale(1);
box-shadow:
0 0 10px rgba(0,255,200,0.2),
0 0 20px rgba(0,255,200,0.3);
}

50%{
transform:scale(1.45);
box-shadow:
0 0 25px rgba(0,255,200,0.6),
0 0 60px rgba(0,255,200,0.8);
}

100%{
transform:scale(1);
box-shadow:
0 0 10px rgba(0,255,200,0.2),
0 0 20px rgba(0,255,200,0.3);
}
}

.text{
color:#7CFF9E;
}

/* Result */
.result{
margin-top:10px;
color:#ffd700;
}

/* Footer */
.footer{
margin-top:25px;
color:#888;
font-size:13px;
}
</style>
</head>

<body>

<header>
<span class="back" onclick="goHome()">←</span>
🧠 Mind Gym
</header>

<div class="container">

<!-- Stats -->
<div class="stats">
<div>🔥 Streak: <span id="streak">0</span></div>
<div>⭐ XP: <span id="xp">0</span></div>
</div>

<!-- Focus Drill -->
<div class="card" onclick="startFocus()">
<h3>🎯 Focus Drill</h3>
<p>60 सेकंड सांस पर ध्यान दें</p>
<div id="focusResult" class="result"></div>
</div>

<div class="circle" id="circle"></div>
<div class="text" id="breathText">श्वास लें</div>

<!-- Thought Shift -->
<div class="card" onclick="thoughtShift()">
<h3>🔁 Thought Shift</h3>
<p>Negative → Positive</p>
</div>

<!-- Awareness Drill -->
<div class="card" onclick="awarenessDrill()">
<div id="awarenessResult" class="result"></div>
<h3>👁 Awareness Drill</h3>
<p>साक्षी भाव अभ्यास</p>
</div>

<div class="footer">
🔥 रोज 3 मिनट Mind Gym = Powerful Mind
</div>

</div>

<script>
let streak = localStorage.getItem("streak") || 0;
let xp = localStorage.getItem("xp") || 0;

document.getElementById("streak").innerText = streak;
document.getElementById("xp").innerText = xp;

/* Focus Drill */
let interval;
function startFocus(){

let circle = document.getElementById("circle");
let text = document.getElementById("breathText");

let time = 60;
let count = 0;

let timer = setInterval(()=>{
count++;

if(count>=time){
clearInterval(timer);
clearInterval(interval);

xp++;
streak++;

localStorage.setItem("xp", xp);
localStorage.setItem("streak", streak);

document.getElementById("xp").innerText = xp;
document.getElementById("streak").innerText = streak;

document.getElementById("focusResult").innerText="🔥 आपने अभ्यास पूरा किया";
text.innerText="पूर्ण";
}
},1000);
}

/* Thought Shift */
function thoughtShift(){
const thoughts = [
"मैं असफल हूँ → मैं सीख रहा हूँ",
"सब गलत है → सब मेरे लिए है",
"मैं नहीं कर सकता → मैं कोशिश कर सकता हूँ",
"समस्या है → अवसर है",
"डर है → विकास है"
];
alert(thoughts[Math.floor(Math.random()*thoughts.length)]);
}

/* Awareness Drill */
function awarenessDrill(){
document.getElementById("awarenessResult").innerText =
"👁 3 चीजें देखें\n🔊 3 आवाजें सुनें\n🌿 सांस महसूस करें";
}

/* Home */
function goHome(){
window.location.href="../index.html";
}
</script>

</body>
</html>
